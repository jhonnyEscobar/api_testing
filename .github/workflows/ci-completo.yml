name: CI - Completo (Unitarias + Integración)

on:
  push:
    branches:
      - main
      - qa
  pull_request:
    branches:
      - main

jobs:
  pruebas-unitarias:
    name: Pruebas unitarias
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas unitarias
        run: npm run test:ci

      - name: Publicar reporte de pruebas unitarias
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados unitarias
          path: reports/junit.xml
          reporter: jest-junit

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cobertura
          path: coverage/

  pruebas-integracion:
    name: Pruebas de integración (API)
    runs-on: ubuntu-latest
    needs: pruebas-unitarias
    permissions:
      contents: read
      checks: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas de integración
        run: npx jest tests/api.test.js --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: reports
          JEST_JUNIT_OUTPUT_NAME: junit-integracion.xml

      - name: Publicar reporte de integración
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados integración
          path: reports/junit-integracion.xml
          reporter: jest-junit
