<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda de Productos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.5rem; }
    nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.95rem; }
    nav a:hover { text-decoration: underline; }

    .hero {
      background: #3498db;
      color: white;
      text-align: center;
      padding: 60px 20px;
    }
    .hero h2 { font-size: 2rem; margin-bottom: 10px; }
    .hero p { font-size: 1.1rem; margin-bottom: 24px; }
    .hero button {
      background: white;
      color: #3498db;
      border: none;
      padding: 12px 28px;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .hero button:hover { background: #ecf0f1; }

    .productos {
      display: flex;
      gap: 20px;
      justify-content: center;
      padding: 40px 20px;
      flex-wrap: wrap;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      width: 200px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .card h3 { margin-bottom: 8px; }
    .card .precio { color: #27ae60; font-weight: bold; font-size: 1.1rem; margin-bottom: 12px; }
    .card button {
      background: #2c3e50;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }
    .card button:hover { background: #3d5166; }

    footer {
      text-align: center;
      padding: 20px;
      background: #2c3e50;
      color: #aaa;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>TiendaTech</h1>
    <nav>
      <a href="#productos">Productos</a>
      <a href="#contacto">Contacto</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Bienvenido a TiendaTech</h2>
    <p>Los mejores productos tecnológicos al mejor precio</p>
    <button id="btn-ver-productos">Ver productos</button>
  </section>

  <section class="productos" id="productos">
    <div class="card">
      <h3>Laptop</h3>
      <p class="precio">$1.500.000</p>
      <button>Agregar al carrito</button>
    </div>
    <div class="card">
      <h3>Mouse</h3>
      <p class="precio">$35.000</p>
      <button>Agregar al carrito</button>
    </div>
    <div class="card">
      <h3>Teclado</h3>
      <p class="precio">$80.000</p>
      <button>Agregar al carrito</button>
    </div>
  </section>

  <footer id="contacto">
    © 2026 TiendaTech — contacto@tiendatech.com
  </footer>

</body>
</html>
